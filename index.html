<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 Beany 模拟器</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="data/run-data.js"></script>
  <style>
    .run-card .shishen-badge {
      background: color-mix(in srgb, var(--beany-color) 25%, transparent);
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>🐾 Beany 模拟器</h1>
    <p class="subtitle">多 Agent 性格演化 RPG · 平行宇宙对比展示</p>
    
    <div class="run-cards" id="run-cards">
      <!-- Cards generated by JS -->
    </div>
  </div>
  
  <script>
    const cardsContainer = document.getElementById('run-cards');
    const runKeys = Object.keys(RUN_DATA);
    
    if (runKeys.length === 0) {
      cardsContainer.innerHTML = '<p style="color:var(--text-muted)">⚠️ 未找到运行数据，请先运行 build-data.mjs</p>';
    } else {
      cardsContainer.innerHTML = runKeys.map(key => {
        const run = RUN_DATA[key];
        const color = run.color;
        const shishen = run.shishen;
        const persona = run.personaLabel;
        const dominant = run.dominantElementCn;
        const age = run.ageStageLabel;
        const health = run.finalStats?.health || '—';
        const weights = run.finalStats?.weights || {};
        const weightStr = Object.entries(weights)
          .map(([k, v]) => `${ELEM_CN[k] || k}${Math.round(v * 100)}%`)
          .join(' ');
        
        return `
          <div class="run-card" onclick="selectRun('${key}')" style="--beany-color:${color}">
            <div class="shishen-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">
              ${shishen}
            </div>
            <h3>${persona}</h3>
            <div class="details">
              <div>🌳 ${dominant} · ${age}</div>
              <div>❤️ 健康 ${health}</div>
              <div style="font-size:0.75rem;margin-top:0.3rem">${weightStr}</div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function selectRun(key) {
      window.location.href = 'game.html?runs=' + encodeURIComponent(JSON.stringify([key]));
    }
  </script>
</body>
</html>
